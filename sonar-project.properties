sonar.projectKey=bsv-blockchain_py-sdk
sonar.organization=bsv

# NOTE: This file is used by CI-based (scanner) analysis only. SonarQube Cloud
# Automatic Analysis IGNORES it — those exclusions live in .sonarcloud.properties.
# Keep the sonar.exclusions line below in sync with .sonarcloud.properties.

# Exclude pyproject.toml from analysis — S8565 (lock file) false positive
# This project uses setuptools + uv.lock for dependency pinning
sonar.exclusions=pyproject.toml,_bsv_native/secp256k1/**
